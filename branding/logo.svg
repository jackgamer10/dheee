<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Cyan glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Matrix/Terminal Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00ffff" stroke-width="0.5" stroke-opacity="0.1"/>
    </pattern>

    <!-- Scanline Pattern -->
    <pattern id="scanlines" width="800" height="4" patternUnits="userSpaceOnUse">
      <rect width="800" height="2" fill="#000" fill-opacity="0.3" />
    </pattern>

    <!-- Deep Terminal Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#002222;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Background Layer 1: Base Gradient -->
  <rect width="800" height="800" fill="url(#bgGrad)" />

  <!-- Background Layer 2: Grid Lines -->
  <rect width="800" height="800" fill="url(#grid)" />

  <!-- Background Layer 3: Scanlines -->
  <rect width="800" height="800" fill="url(#scanlines)" />

  <!-- Outer HUD Frame -->
  <rect x="20" y="20" width="760" height="760" fill="none" stroke="#00ffff" stroke-width="2" stroke-opacity="0.3" />
  <path d="M20,100 L20,20 L100,20 M700,20 L780,20 L780,100 M780,700 L780,780 L700,780 M100,780 L20,780 L20,700" fill="none" stroke="#00ffff" stroke-width="4" filter="url(#glow)" />

  <!-- Vault Frame -->
  <rect x="100" y="100" width="600" height="600" rx="40" fill="none" stroke="#00ffff" stroke-width="8" filter="url(#glow)" opacity="0.6" />

  <!-- Vault Rivets -->
  <circle cx="140" cy="140" r="8" fill="#00ffff" opacity="0.8" />
  <circle cx="660" cy="140" r="8" fill="#00ffff" opacity="0.8" />
  <circle cx="140" cy="660" r="8" fill="#00ffff" opacity="0.8" />
  <circle cx="660" cy="660" r="8" fill="#00ffff" opacity="0.8" />

  <!-- The Dial (Large Circle) -->
  <circle cx="400" cy="400" r="250" fill="#051010" stroke="#00ffff" stroke-width="12" filter="url(#glow)" />
  <circle cx="400" cy="400" r="240" fill="none" stroke="#00ffff" stroke-width="1" stroke-dasharray="15,15" opacity="0.5" />

  <!-- Skull Integrated into Vault Center -->
  <g transform="translate(300, 280) scale(2)">
    <!-- Cranium -->
    <path d="M50,0 C22.4,0 0,22.4 0,50 C0,67.6 9.1,83.1 22.9,92.1 L22.9,114.3 C22.9,122.9 29.9,130 38.6,130 L61.4,130 C70.1,130 77.1,122.9 77.1,114.3 L77.1,92.1 C90.9,83.1 100,67.6 100,50 C100,22.4 77.6,0 50,0 Z" fill="#000" stroke="#00ffff" stroke-width="2" filter="url(#glow)" />

    <!-- Eyes -->
    <ellipse cx="30" cy="55" rx="12" ry="15" fill="#000" stroke="#00ffff" stroke-width="1" />
    <ellipse cx="70" cy="55" rx="12" ry="15" fill="#000" stroke="#00ffff" stroke-width="1" />

    <!-- Inner Glowing Dots (M shape hints) -->
    <circle cx="30" cy="55" r="4" fill="#00ff00" filter="url(#glow)" />
    <circle cx="70" cy="55" r="4" fill="#00ff00" filter="url(#glow)" />

    <!-- Nose -->
    <path d="M50,75 L43,90 L57,90 Z" fill="#000" stroke="#00ffff" stroke-width="1" />

    <!-- Teeth -->
    <g transform="translate(35, 105)">
      <rect x="0" y="0" width="4" height="15" fill="#00ff00" opacity="0.8" />
      <rect x="8" y="0" width="4" height="15" fill="#00ffff" opacity="0.8" />
      <rect x="16" y="0" width="4" height="15" fill="#00ff00" opacity="0.8" />
      <rect x="24" y="0" width="4" height="15" fill="#00ffff" opacity="0.8" />
      <rect x="32" y="0" width="4" height="15" fill="#00ff00" opacity="0.8" />
    </g>

    <!-- Large M at the center of the skull -->
    <path d="M40,30 L45,30 L50,45 L55,30 L60,30 L60,60 L55,60 L55,40 L50,55 L45,40 L45,60 L40,60 Z" fill="#00ff00" opacity="0.9" filter="url(#glow)" />
  </g>

  <!-- HUD Text Elements -->
  <text x="40" y="50" font-family="monospace" font-size="12" fill="#00ffff" opacity="0.7">LINK: ESTABLISHED</text>
  <text x="40" y="70" font-family="monospace" font-size="12" fill="#00ffff" opacity="0.7">SND3R: ACTIVE</text>
  <text x="760" y="50" font-family="monospace" font-size="12" fill="#00ffff" opacity="0.7" text-anchor="end">ENCRYPTION: AES-256</text>
  <text x="760" y="70" font-family="monospace" font-size="12" fill="#00ffff" opacity="0.7" text-anchor="end">VAULT: LOCKED</text>

  <!-- MAGXXIC TEXT -->
  <text x="400" y="740" font-family="'Courier New', monospace" font-size="60" fill="#00ffff" text-anchor="middle" font-weight="bold" filter="url(#glow)">MAGXXIC VAULT</text>
  <text x="400" y="775" font-family="'Courier New', monospace" font-size="20" fill="#00ff00" text-anchor="middle" opacity="0.8">SYSTEM STATUS: ARMED | PROTOCOL: RATEL</text>

</svg>
